<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Selection</title>
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <h1 class="title">DeckedOut</h1>
      <button id="signInBtn" class="sign-in-btn">Sign In</button>
    </header>

    <main class="selection-page">
      <section class="panel user-panel">
        <h2>Enter Username:</h2>
        <input type="text" id="username" class="menu-input input" placeholder="Username" />
      </section>

      <section class="panel panel-card host-panel">
          <div class="panel-heading">Host a game</div>
          <p class="panel-copy">More games will be available soon. (Definitely... Probably... Eventually...)</p>
          <div class="game-buttons">
            <button class="create-room-btn" data-game-type="cribbage">Cribbage</button>
            <button class="create-room-btn" data-game-type="wavelength">Wavelength</button>
            <!-- Add More Games Here -->
          </div>
        </section>
      </section>

      <section class="panel-grid">
        <section class="panel panel-card join-panel">
          <div class="panel-heading">Join a game</div>
          <div class="join-section">
            <input type="text" id="roomId" class="input" placeholder="Room Code" />
            <button id="joinBtn" class="join-btn">Join</button>
          </div>
        </section>
    </main>
  </div>
</body>
</html>
