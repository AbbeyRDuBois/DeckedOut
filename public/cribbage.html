<!-- Contains Room Specific Content--> 
  

<div id="flipped"></div>
<div id="peggingContainer">
  <div id="pegging">Pegging Total:</div>
  <div id="peggingTotal"></div>
</div>

<div class="local-indicator" id="local-turn" data-type='turn' id="local-player-indicator">T</div>
<div class="local-indicator" id="local-owner" data-type='crib' id="local-crib-indicator">C</div>

<div id="joker-overlay" class="popup-overlay" style="display: none;">
  <div id="joker-popup" class="popup">
    <div id="joker-deck" class="joker-section">
      <div class="joker-row"></div>
      <div class="joker-row"></div>
      <div class="joker-row"></div>
      <div class="joker-row"></div>
    </div>
    <div class="joker-divider"></div>
    <div id="joker-hand"></div>
  </div>
</div>

<div id="throwing">Throwing</div>

<div class="scoring-overlay hidden">
  <div class="player-name" id="scoring-name"></div>
  <div class="hand" id="scoring-hand"></div>
  <div class="total-score" id="scoring-score"></div>
  <div class="grand-total" id="scoring-grand"></div>
</div>
